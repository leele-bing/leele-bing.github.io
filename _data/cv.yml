      - company: Robotics, Perception and Intelligence Laboratory, Southern University of Science and Technology
        position: Graduate Researcher
        location: Shenzhen, China
        start_date: 2020-09
        end_date: present
        summary: Research on motion planning and control for autonomous robots in service and transportation scenarios.
        highlights:
          - Designed a hierarchical motion planning method for collaborative transportation with airport luggage trolley collection robots.
          - Developed a Leader-Follower multi-robot formation controller based on CLF-CBF-QP.
          - Contributed to pedestrian-following navigation for an autonomous mobile base in a throat-swab robot project.
          - Proposed a multi-level motion planning method for hexapod robots in dynamic rough terrain.
          - Participated in robotic grasping experiments guided by semantic scene reasoning.

      - company: Internet of Things Laboratory, Southern University of Science and Technology
        position: Undergraduate Researcher
        location: Shenzhen, China
        start_date: 2018-09
        end_date: 2020-06
        summary: Research on passive e-textile sensing and RFID-based wearable sensors.
        highlights:
          - Proposed an RFID-based passive strain and displacement sensor using flexible conductive yarn.
          - Designed a passive flexible sensor based on conductive yarn for human respiration detection.

